# ─────────────────────────────────────────────────────────────────────────────
# WandB sweep for train_zarr.py — wandb-dominant over Hydra.
#   wandb sweep experiments/sweep_single.yaml      → prints sweep_id
#   wandb agent <entity>/<project>/<sweep_id>
#
# `command` omits ${args} on purpose: Hydra composes the default config cleanly,
# then train_zarr.py overlays wandb.config on top (the readback in run()). Params
# arrive as real Python objects via wandb.config — so LISTS work natively.
# Use DOTTED VALUE keys (ablation.mode, solver.solver_key, model.hidden_dims, …),
# not Hydra group names.
# ─────────────────────────────────────────────────────────────────────────────

program: experiments/train_zarr.py
method:  grid

metric:
  goal: maximize
  name: val_r_squared

command:
  - ${env}
  - ${interpreter}
  - ${program}

parameters:
  wandb.enabled:
    value: true

  ablation.mode:
    value: default                # default | prophet | random
  solver.solver_key:
    value: otfm                   # otfm | eqm | genot

  # architecture — lists work now (overlaid via wandb.config, not the CLI)
  model.hidden_dims:
    value: [2048, 2048, 2048]
  model.decoder_dims:
    value: [1024]
  model.condition_embedding_dim:
    value: 256
  model.probability_path_kwargs.constant_noise:
    value: 0.1

  match_fn.epsilon:
    value: 10

  training.peak_lr:
    value: 1.0e-4
  training.batch_size:
    value: 256
  training.num_iterations:
    value: 45000
  training.valid_freq:
    value: 20000
  training.n_val_conditions:
    value: 20
