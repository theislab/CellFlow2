hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - solver=otfm
    - selected_datasets=[tahoe_a549,combosciplex]
    - conditioning=concatenation
    - cell_embedding.cell_line_rep_key=cell_line_ccle_embeddings
    - match_fn.epsilon=10
    - model.probability_path_kwargs.constant_noise=0.1
    - training.num_iterations=2
    - training.valid_freq=1
    - model.decoder_dims=[1024]
    - model.hidden_dims=[1024]
    - training.batch_size=256
  job:
    name: train_crossdatasets
    chdir: null
    override_dirname: cell_embedding.cell_line_rep_key=cell_line_ccle_embeddings,conditioning=concatenation,match_fn.epsilon=10,model.decoder_dims=[1024],model.hidden_dims=[1024],model.probability_path_kwargs.constant_noise=0.1,selected_datasets=[tahoe_a549,combosciplex],solver=otfm,training.batch_size=256,training.num_iterations=2,training.valid_freq=1
    id: ???
    num: ???
    config_name: base_train_crossdatasets
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /ictstr01/groups/ml01/workspace/xiaotong.fu/pancellflow/CellFlow2/experiments
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /lustre/groups/ml01/workspace/xiaotong.fu/pancellflow/CellFlow2/experiments/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /ictstr01/groups/ml01/workspace/xiaotong.fu/pancellflow/CellFlow2/experiments/outputs/2026-04-08/14-09-27
    choices:
      datasets: drug
      conditioning: concatenation
      solver: otfm
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
