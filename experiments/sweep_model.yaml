# ─────────────────────────────────────────────────────────────────────────────
# WandB sweep — compare default vs random vs prophet
# Usage:
#   wandb sweep experiments/sweep_model.yaml          → prints sweep_id
#   wandb agent <entity>/<project>/<sweep_id>
# ─────────────────────────────────────────────────────────────────────────────

program: experiments/train_comparison.py
method:  grid

metric:
  goal: maximize
  name: val_r_squared

parameters:
  model:
    values: [default, random, prophet]