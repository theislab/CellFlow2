# @package _global_
training:
  batch_size:        1024
  num_iterations:    200000
  warmup_iterations: 5000
  peak_lr:           1.0e-4
  end_lr:            1.0e-5
  init_lr:           0.0
  grad_accumulation: 20
  valid_freq:        20000
  n_val_conditions:  null
  log_every:         1000    # how often (steps) to log train_loss to wandb
  checkpoint_metric: nn_displacement_corr   # metric used by BestModelCheckpoint
  pool_fraction:     0.7
  replacement_prob:  0.5

recon:
  decoder_path:       /storage/pancellflow/recon_weights/dec_X_scconcept
  h5ad_path:          /storage/pancellflow/sciplex3_with_emb.h5ad
  condition_obs_keys: [cell_line, drug, dose_value]   # obs cols matching cond_key tuple order
  cell_line_obs_key:  cell_line   # which of the above is the cell line column
  control_obs_key:    control
  log_dose_obs_key:   dose_value  # raw dose in h5ad; cond key holds log1p(dose) → matched numerically