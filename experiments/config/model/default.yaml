# @package _global_
model:
  hidden_dims:             [2048, 2048, 2048]
  decoder_dims:            [4096, 4096, 4096]
  condition_embedding_dim: 256
  max_combination_length:  1
  conditioning_key:        ${conditioning.conditioning_key}
  conditioning_kwargs:     ${conditioning.conditioning_kwargs}
  probability_path_kwargs: {constant_noise: 0.0}

  # Condition (set) encoder. encoder_arch is applied per condition key — the code
  # loops over the condition keys and builds {key: encoder_arch}, so every
  # modality (drug, prophet, cell_line) gets its own pre-pool MLP (own weights),
  # then the tokens are pooled permutation-invariantly.
  condition_encoder:
    pooling:             attention_token
    pooling_kwargs:      {}
    cond_output_dropout: 0.9
    encoder_arch:        [{layer_type: mlp, dims: [1024, 1024], dropout_rate: 0.0}]
    layers_after_pool:   [{layer_type: mlp, dims: [1024, 1024], dropout_rate: 0.0}]
