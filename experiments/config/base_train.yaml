# @package _global_
defaults:
  - solver: eqm
  - _self_

cell_embedding:
  key: X_state

training:
  num_iterations: 100000
  warmup_iterations: 2000
  peak_lr: 1e-3
  end_lr: 1e-5
  batch_size: 256

model:
  decoder_dims: "(2048, 2048, 2048)"
  conditioning_key: concatenation # "concatenation", "film", "resnet", "adaln_zero"
  conditioning_kwargs:
    num_heads: 8
    mlp_ratio: 4
  probability_path_kwargs: {constant_noise: 0.1}

match_fn:
  epsilon: 5