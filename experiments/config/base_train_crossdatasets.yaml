# @package _global_
defaults:
  - solver: otfm
  - conditioning: concatenation # "concatenation", "film", "resnet", "adaln_zero"
  - datasets: drug
  - _self_


selected_datasets: [combosciplex]

cell_embedding:
  key: X_state
  cell_line_rep_key: cell_line_ccle_embeddings

training:
  num_iterations: 100000
  warmup_iterations: 2000
  peak_lr: 1e-3
  end_lr: 1e-5
  batch_size: 256
  valid_freq: 2000

model:
  decoder_dims: [1024]
  hidden_dims:  [1024]
  conditioning_key: ${conditioning.conditioning_key}
  conditioning_kwargs: ${conditioning.conditioning_kwargs}
  probability_path_kwargs: {constant_noise: 0.1}

match_fn:
  epsilon: 10