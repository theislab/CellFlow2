  #   path: /lustre/groups/ml01/workspace/xiaotong.fu/data/pancellflow/unipert/srivatsan20_sciplex4.h5ad
    # seed: 51
  
cell_embedding:
  key: X_state

training:
  num_iterations: 100000
  warmup_iterations: 2000
  peak_lr: 1e-3
  end_lr: 1e-5
  batch_size: 256
  valid_freq: 2000

model:
  decoder_dims: [1024]
  hidden_dims:  [1024]
  conditioning_key: ${conditioning.conditioning_key}
  conditioning_kwargs: ${conditioning.conditioning_kwargs}
  probability_path_kwargs: {constant_noise: 0.1}

match_fn:
  epsilon: 10