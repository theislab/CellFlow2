# @package _global_
# configs/launcher/gpu_normal.yaml
defaults:
  - override /hydra/launcher: submitit_slurm


hydra:
  launcher:                      
    cpus_per_task: 10                
    mem_gb: 300                      
    partition: gpu_p                 
    qos: gpu_priority               
    gres: gpu:1                      
    timeout_min: 720    
    exclude: gpusrv55

