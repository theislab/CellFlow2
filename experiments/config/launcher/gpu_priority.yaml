# @package _global_
# Apply with multirun, e.g.:
#   python experiments/train_h5ad.py -m +launcher=gpu_priority solver=otfm,eqm
defaults:
  - override /hydra/launcher: submitit_slurm

hydra:
  launcher:
    cpus_per_task: 10
    mem_gb: 300
    partition: gpu_p
    qos: gpu_priority
    gres: gpu:1
    timeout_min: 720
    exclude: gpusrv55
