# ─────────────────────────────────────────────────────────────────────────────
# Epsilon sweep — sciPlex, prophet mode, alpha=0 (no sinkhorn regularization).
# Sweeps match_fn.epsilon to find the best OT matching resolution.
#   wandb sweep experiments/sweep_epsilon.yaml   → prints sweep_id
#   wandb agent pancellflow/sciplex-sinkhorn/<sweep_id>
# ─────────────────────────────────────────────────────────────────────────────

program: experiments/train_zarr.py
method:  grid

metric:
  goal: maximize
  name: val_nn_displacement_corr

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - datasets=zarr_sciplex
  - selected_datasets=[sciplex]

parameters:
  wandb.enabled:
    value: true
  wandb.project:
    value: sciplex_epsilon_prophet

  # ── swept ────────────────────────────────────────────────────────────────
  match_fn.epsilon:
    values: [1.0, 0.1, 0.01]

  # ── fixed: no sinkhorn regularization ────────────────────────────────────
  match_fn.sinkhorn_alpha:
    value: 0.0

  # ── ablation ─────────────────────────────────────────────────────────────
  ablation.mode:
    value: prophet

  # ── architecture ─────────────────────────────────────────────────────────
  model.conditioning_key:
    value: concatenation
  model.hidden_dims:
    value: [2048, 2048, 2048]
  model.decoder_dims:
    value: [2048, 2048, 2048]
  model.condition_embedding_dim:
    value: 256
  model.probability_path_kwargs.constant_noise:
    value: 0.1

  # ── training ─────────────────────────────────────────────────────────────
  training.peak_lr:
    value: 1.0e-4
  training.batch_size:
    value: 512
  training.warmup_iterations:
    value: 10000
  training.grad_accumulation:
    value: 20
  training.pool_fraction:
    value: 0.7
  training.replacement_prob:
    value: 0.5
  training.num_iterations:
    value: 2000000
  training.valid_freq:
    value: 200000