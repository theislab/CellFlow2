# ─────────────────────────────────────────────────────────────────────────────
# Embedding sweep — all cell state embeddings, sciPlex, prophet mode.
# Sweeps datasets.sciplex.path across all 5 embeddings with fixed [256,256,256].
#   wandb sweep experiments/sweep_embedding.yaml   → prints sweep_id
#   wandb agent pancellflow/sciplex-embedding/<sweep_id>
# ─────────────────────────────────────────────────────────────────────────────

program: experiments/train_zarr.py
method:  grid
project: sciplex_embedding_prophet

metric:
  goal: maximize
  name: val_nn_displacement_corr

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - datasets=zarr_sciplex
  - selected_datasets=[sciplex]

parameters:
  wandb.enabled:
    value: true
  wandb.project:
    value: sciplex_cellrep_prophet

  # ── swept ────────────────────────────────────────────────────────────────
  datasets.sciplex.path:
    values:
      - /storage/pancellflow/sciplex3_X_state.zarr
      - /storage/pancellflow/sciplex3_X_scgpt.zarr
      - /storage/pancellflow/sciplex3_X_scconcept.zarr
      - /storage/pancellflow/sciplex3_X_scimilarity.zarr
      - /storage/pancellflow/sciplex3_X_scimilarity_correct.zarr

  # ── architecture ─────────────────────────────────────────────────────────
  model.hidden_dims:
    value: [256, 256, 256]
  model.decoder_dims:
    value: [256, 256, 256]
  model.conditioning_key:
    value: concatenation
  model.condition_embedding_dim:
    value: 256
  model.probability_path_kwargs.constant_noise:
    value: 0.1

  # ── ablation ─────────────────────────────────────────────────────────────
  ablation.mode:
    value: prophet

  # ── matching ─────────────────────────────────────────────────────────────
  match_fn.epsilon:
    value: 1.0
  match_fn.sinkhorn_alpha:
    value: 0.0

  # ── training ─────────────────────────────────────────────────────────────
  training.peak_lr:
    value: 1.0e-4
  training.batch_size:
    value: 512
  training.warmup_iterations:
    value: 10000
  training.grad_accumulation:
    value: 20
  training.pool_fraction:
    value: 0.7
  training.replacement_prob:
    value: 0.5
  training.num_iterations:
    value: 2000000
  training.valid_freq:
    value: 200000
