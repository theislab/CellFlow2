# ─────────────────────────────────────────────────────────────────────────────
# WandB sweep — compare default vs random vs prophet
# Usage:
#   wandb sweep config/sweep_model.yaml          → prints sweep_id
#   wandb agent <entity>/<project>/<sweep_id>
# ─────────────────────────────────────────────────────────────────────────────

program: train_comparison.py
method:  grid

metric:
  goal: maximize
  name: val_r_squared

parameters:
  model:
    values: [default]
  zarr_path:
    value: /storage/pancellflow/tahoe_updated.zarr
  training.batch_size:
    value: 1024
  training.pool_fraction:
    value: 0.7
  training.replacement_prob:
    value: 0.5
  training.num_iterations:
    value: 200000
  training.valid_freq:
    value: 20000
  training.n_val_conditions:
    value: 20

